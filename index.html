<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emir & Eda ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root { --pembe: #FFB6C1; --koyu-pembe: #FF1493; --beyaz: #FFFFFF; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a000d;
            font-family: 'Poppins', sans-serif;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #4b0026, #000);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1s ease;
        }

        #entry-btn {
            padding: 15px 35px; border: 2px solid var(--pembe); border-radius: 50px;
            color: white; font-family: 'Dancing Script', cursive; font-size: 1.5rem;
            cursor: pointer; background: rgba(255, 20, 147, 0.2);
            box-shadow: 0 0 25px var(--koyu-pembe); animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--koyu-pembe); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px var(--koyu-pembe); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--koyu-pembe); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            padding: 30px 20px;
            background: rgba(255, 182, 193, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 350px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-card { opacity: 1 !important; transform: scale(1) !important; }

        .names {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 25px;
            text-shadow: 0 0 15px var(--koyu-pembe);
        }

        .timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 5px;
            border-radius: 15px;
            border-bottom: 3px solid var(--pembe);
        }

        .num { display: block; font-size: 1.4rem; font-weight: 600; color: white; }
        .lab { font-size: 0.55rem; color: var(--pembe); text-transform: uppercase; font-weight: 600; }

        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px var(--pembe);
            cursor: pointer;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .click-heart {
            position: absolute;
            pointer-events: none;
            z-index: 1500;
            animation: fly 1.2s ease-out forwards;
            font-size: 1.5rem;
        }

        @keyframes fly {
            0% { transform: scale(0.5) translate(0,0); opacity: 1; }
            100% { transform: scale(2) translate(0, -100px) rotate(20deg); opacity: 0; }
        }
    </style>
</head>

<body onclick="createHeart(event)">

<div id="overlay">
    <button id="entry-btn">Bizim İçin Tıkla ❤️</button>
</div>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="glass-card" id="mainCard">
        <div class="names">Emir & Eda</div>

        <div class="timer">
            <div class="box"><span id="d" class="num">0</span><span class="lab">Gün</span></div>
            <div class="box"><span id="h" class="num">0</span><span class="lab">Saat</span></div>
            <div class="box"><span id="m" class="num">0</span><span class="lab">Dk</span></div>
            <div class="box"><span id="s" class="num">0</span><span class="lab">Sn</span></div>
        </div>

        <p style="color:white;margin-top:25px;letter-spacing:4px;font-size:0.7rem;opacity:0.8;font-weight:600;">
            İYİ Kİ VARSIN
        </p>
    </div>
</div>

<div class="music-control" id="musicBtn">🎵</div>

<!-- SADECE BURASI DEĞİŞTİ -->
<audio id="bgM" loop src="ask.mp3"></audio>

<script>
    const audio = document.getElementById('bgM');
    const overlay = document.getElementById('overlay');
    const card = document.getElementById('mainCard');
    const musicBtn = document.getElementById('musicBtn');

    document.getElementById('entry-btn').onclick = () => {
        overlay.style.display = 'none';
        card.classList.add('show-card');
        musicBtn.style.display = 'flex';

        audio.volume = 0;
        audio.play();

        let v = 0;
        let fade = setInterval(() => {
            if (v < 0.8) { v += 0.05; audio.volume = v; }
            else clearInterval(fade);
        }, 150);
    };

    const start = new Date('2026-06-25T00:00:00');

    function updateTimer() {
        const now = new Date();
        const diff = now - start;

        document.getElementById('d').innerText = Math.floor(diff / 86400000);
        document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24);
        document.getElementById('m').innerText = Math.floor((diff / 60000) % 60);
        document.getElementById('s').innerText = Math.floor((diff / 1000) % 60);
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let hearts = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.onresize = resize;
    resize();

    class Heart {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 20;
            this.size = Math.random() * 10 + 5;
            this.speed = Math.random() * 1.5 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.3;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = '#FFB6C1';
            ctx.font = `${this.size}px Arial`;
            ctx.fillText('❤', this.x, this.y);
            this.y -= this.speed;
            if (this.y < -20) this.init();
        }
    }

    for (let i = 0; i < 30; i++) hearts.push(new Heart());

    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        hearts.forEach(h => h.draw());
        requestAnimationFrame(anim);
    }
    anim();

    function createHeart(e) {
        const h = document.createElement('div');
        h.className = 'click-heart';
        h.innerHTML = '❤️';
        h.style.left = e.clientX + 'px';
        h.style.top = e.clientY + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1200);
    }
</script>

</body>
</html>
